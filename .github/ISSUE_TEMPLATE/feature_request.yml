name: Feature request
description: Propose an improvement to SGRX behavior or developer experience.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Substantial behavior or interface
        changes should be discussed here before implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need, limitation, or workflow problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or interface you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs did you consider?

  - type: textarea
    id: security
    attributes:
      label: Security and privacy considerations
      description: Explain any effects on command execution, isolation, provenance, credentials, or private source.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, mockups, or related issues if useful.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I have not included credentials, private source, or other sensitive information.
          required: true
