name: Bug report
description: Report reproducible behavior that is not working as intended.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SGRX. Do not include credentials, private
        repository content, or security-sensitive details in a public issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Give a concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that demonstrates the problem.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include sanitized output when useful.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SGRX version
      placeholder: 0.5.1 or commit SHA
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your operating system, Python and Node.js versions, and relevant tool versions.
      placeholder: Windows 11; Python 3.12; Node.js 24; OpenSrc 0.7.3; Graphify 0.9.12; GitNexus 1.6.5
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized logs, screenshots, or other context if useful.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I removed credentials, private source, and other sensitive information.
          required: true
        - label: This is not a security vulnerability or Code of Conduct report.
          required: true
