name: "Integration"

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: "read"

jobs:
  toolchain-integration:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v7"
      - name: "Set up Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"
      - name: "Set up Node.js"
        uses: "actions/setup-node@v4"
        with:
          node-version: "24"
      - name: "Install pinned Node.js integration tools"
        timeout-minutes: 10
        env:
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
        run: "npm install --global opensrc@0.7.3 gitnexus@1.6.5"
      - name: "Install pinned Graphify binary wheels"
        timeout-minutes: 5
        run: "python -m pip install --only-binary=:all: graphifyy==0.9.12"
      - name: "Verify toolchain"
        run: "python skills/sgrx/scripts/sgrx.py doctor --json"
      - name: "Run real isolated-tool integration tests"
        env:
          SGRX_RUN_INTEGRATION: "1"
        run: "python -m unittest tests.test_smoke_opt_in -v"
